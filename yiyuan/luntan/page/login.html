<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圣容会 - 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"SimSun","Microsoft YaHei",serif;}
body{background:#ffffff;color:#333333;line-height:1.7;padding-top:160px;}
a{color:#333333;text-decoration:none;}
a:hover{text-decoration:underline;}

/* 悬浮固定头部整体 */
.fixed-header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:999;
    background:#ffffff;
    border-bottom:1px solid #eeeeee;
}

/*头部横幅 素白简约 大标题圆润字体 */
.header-top{
    padding:16px 0;
    text-align:center;
}
.header-top h1{
    font-size:26px;
    letter-spacing:2px;
    font-weight:normal;
    font-family:"Microsoft YaHei", "黑体", sans-serif;
}
.header-top p{font-size:13px;color:#666666;margin-top:4px;}

/*导航栏 纯白浅灰线条*/
.nav-bar{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
    padding:12px 0;
}
.nav-bar a{
    color:#444444;
    font-size:15px;
    white-space:nowrap;
}
.nav-bar a.active{
    color:#222222;
    font-weight:bold;
}
/* 登录注册按钮样式 */
.nav-btn{
    padding:5px 14px;
    border:1px solid #cccccc;
    border-radius:3px;
}
.nav-btn.register{
    background:#f5f5f5;
}
.nav-btn:hover{
    background:#eeeeee;
    text-decoration:none;
}

/*容器整体纯白底色 */
.container{
    width:1000px;
    margin:30px auto;
}
.main{
    width:420px;
    margin:0 auto;
    background:#ffffff;
    padding:35px;
    border:1px solid #eeeeee;
}

h2{
    border-left:2px solid #999999;
    padding-left:12px;
    margin-bottom:28px;
    font-size:20px;
    font-weight:normal;
    text-align:center;
    border-left:none;
}

.form-item{
    margin-bottom:18px;
}
.form-item label{
    display:block;
    font-size:15px;
    margin-bottom:6px;
    color:#444;
}
.form-item input{
    width:100%;
    height:40px;
    padding:0 12px;
    border:1px solid #ddd;
    font-size:15px;
}
.form-item input:focus{
    outline:none;
    border-color:#999;
}

.error-tip{
    color:#c83c3c;
    font-size:14px;
    margin-top:4px;
    display:none;
}

.login-submit{
    width:100%;
    height:42px;
    background:#f5f5f5;
    border:1px solid #cccccc;
    border-radius:3px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}
.login-submit:hover{
    background:#eeeeee;
}

.back-link{
    text-align:center;
    margin-top:20px;
    font-size:14px;
    color:#666;
}

/*底部素白浅灰*/
footer{
    background:#ffffff;
    color:#666666;
    text-align:center;
    padding:20px 0;
    margin-top:60px;
    font-size:13px;
    border-top:1px solid #eeeeee;
}
footer small{opacity:0.8;display:block;margin-top:6px;}
</style>
</head>
<body>
<div class="fixed-header">
    <div class="header-top">
        <h1>圣容会</h1>
        <p>邻里善意 · 公益帮扶 · 心灵陪伴</p>
    </div>
    <div class="nav-bar">
        <a href="index.html" class="nav-link">团体简介</a>
        <a href="index.html#service" class="nav-link">组织架构与监管</a>
        <a href="index.html#record" class="nav-link">活动纪实</a>
        <a href="index.html#cooperate" class="nav-link">服务成果与警民合作</a>
        <a href="index.html#join" class="nav-link">志愿者报名</a>

        <a href="login.html" class="nav-btn active">登录</a>
        <a href="register.html" class="nav-btn register">注册</a>
    </div>
</div>

<div class="container">
    <div class="main">
        <h2>账号登录</h2>
        <div class="form-item">
            <label>账号</label>
            <input type="text" id="username" placeholder="请输入账号">
        </div>
        <div class="form-item">
            <label>密码</label>
            <input type="password" id="pwd" placeholder="请输入密码">
            <div class="error-tip" id="errMsg"></div>
        </div>
        <button class="login-submit" id="loginBtn">登录</button>
        <div class="back-link">
            <a href="index.html">返回首页</a>
        </div>
    </div>
</div>

<footer>
    ©2026 圣容会 虚构游戏剧情素材
    <small>声明：本网站为单机游戏虚构内容，无现实对应实体机构</small>
</footer>

<script>
const loginBtn = document.getElementById('loginBtn');
const username = document.getElementById('username');
const pwd = document.getElementById('pwd');
const errMsg = document.getElementById('errMsg');

loginBtn.addEventListener('click',function(){
    const un = username.value.trim();
    const pw = pwd.value.trim();
    errMsg.style.display = 'none';
    errMsg.textContent = '';

    // 许兆账号
    if(un === 'xuzhao'){
        if(pw === 'SACRIFICE'){
            location.href = 'xz.html';
        }else{
            errMsg.textContent = '账号或密码输入错误，请重新核对';
            errMsg.style.display = 'block';
        }
    }
    // 张宝钟账号
    else if(un === 'zhangbaozhong'){
        if(pw === '20230103'){
            location.href = 'zbz.html';
        }else{
            errMsg.textContent = '成立之日';
            errMsg.style.display = 'block';
        }
    }
    // 不存在的账号统一提示
    else{
        errMsg.textContent = '账号或密码输入错误，请重新核对';
        errMsg.style.display = 'block';
    }
})

// 回车快速登录
document.addEventListener('keydown',function(e){
    if(e.key === 'Enter') loginBtn.click();
})
</script>
</body>
</html>
