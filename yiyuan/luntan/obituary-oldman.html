<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>悼念｜沈砚舟老翁</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",SimSun,serif;}
body{
    min-height:100vh;
    color:#e8e8e8;
    overflow-x:hidden;
    background:
        radial-gradient(circle at 50% 50%, rgba(90,0,0,0.22), transparent 38%),
        radial-gradient(circle at 20% 80%, rgba(10,70,50,0.2), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(70,0,0,0.28), transparent 35%),
        radial-gradient(circle at 10% 40%, rgba(30,100,80,0.08), transparent 25%),
        linear-gradient(180deg,#030000,#000 20%,#000 100%);
    background-attachment:fixed;
    animation:bodyPulse 7s infinite ease-in-out;
    position:relative;
}
@keyframes bodyPulse{
    0%,100%{filter:brightness(0.88);}
    50%{filter:brightness(0.72);}
}

.ghost-fog-left,.ghost-fog-right{
    position:fixed;
    top:0;
    width:120px;
    height:100%;
    pointer-events:none;
    z-index:1;
    background:linear-gradient(90deg,rgba(20,90,70,0.18),transparent);
    animation:fogDrift 12s infinite ease-in-out;
}
.ghost-fog-left{left:0;}
.ghost-fog-right{right:0;transform:scaleX(-1);}
@keyframes fogDrift{
    0%,100%{opacity:0.2;transform:translateX(0) scaleX(var(--flip,1));}
    50%{opacity:0.38;transform:translateX(30px) scaleX(var(--flip,1));}
}

.top-mourn{
    width:100%;
    padding:14px 0;
    text-align:center;
    background:linear-gradient(180deg,rgba(15,0,0,0.99),rgba(2,0,0,0.97));
    border-bottom:1px solid #220000;
    box-shadow:0 0 35px rgba(80,0,0,0.6), inset 0 0 30px rgba(20,60,40,0.15);
    position:relative;
    z-index:3;
}
.top-mourn h1{
    font-size:28px;
    letter-spacing:10px;
    color:#550000;
    font-family:"SimHei";
    text-shadow:
        0 0 12px rgba(180,0,0,0.8),
        0 0 22px rgba(20,100,70,0.3);
}
.top-mourn p{margin-top:8px;font-size:13px;color:#885555;letter-spacing:2px;}

.main-container{
    width:960px;
    min-height:620px;
    margin:30px auto;
    display:flex;
    gap:26px;
    align-items:center;
    justify-content:center;
    position:relative;
    z-index:2;
}

.side-couple{
    width:150px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.vertical-scroll{
    width:130px;
    height:480px;
    background:linear-gradient(180deg,#441a00,#220a00 48%,#0f0400);
    padding:0 18px;
    border-radius:2px;
    border:1px solid #331100;
    box-shadow:
        0 0 25px rgba(100,0,0,0.5),
        inset 0 0 45px rgba(0,0,0,0.75),
        inset 0 0 20px rgba(40,120,90,0.12);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    animation:breathFlicker 5s infinite ease-in-out;
}
.vertical-scroll::before,.vertical-scroll::after{
    content:"";position:absolute;width:1px;height:100%;background:linear-gradient(180deg,transparent,#000,transparent);opacity:0.35;
}
.vertical-scroll::before{left:8px;}
.vertical-scroll::after{right:8px;}
@keyframes breathFlicker{
    0%,100%{box-shadow:0 0 25px rgba(100,0,0,0.5), inset 0 0 45px rgba(0,0,0,0.75);}
    50%{box-shadow:0 0 45px rgba(180,0,0,0.8), inset 0 0 65px rgba(60,0,0,0.4), inset 0 0 30px rgba(30,110,80,0.18);}
}

.couple-text{
    writing-mode:vertical-rl;
    letter-spacing:16px;
    font-size:28px;
    color:#ff2222;
    line-height:1;
    text-shadow:
        0 0 8px rgba(255,0,0,0.95),
        0 0 18px rgba(120,0,0,0.7),
        0 0 30px rgba(60,0,0,0.45),
        0 0 40px rgba(10,90,60,0.25);
    white-space:nowrap;
}
.left-couple .couple-text{transform:rotate(180deg);}

.center-photo{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
}
.photo-frame{
    width:320px;
    height:420px;
    background:#020202;
    border:1px solid #440000;
    padding:12px;
    box-shadow:0 0 45px rgba(120,0,0,0.6), inset 0 0 25px rgba(10,60,40,0.15);
    position:relative;
    animation:photoFlicker 4s infinite ease-in-out;
}
@keyframes photoFlicker{
    0%,100%{box-shadow:0 0 45px rgba(120,0,0,0.6), inset 0 0 25px rgba(10,60,40,0.15);}
    50%{box-shadow:0 0 80px rgba(220,0,0,0.95), inset 0 0 40px rgba(20,80,60,0.22);}
}
.photo-frame img{
    width:100%;height:100%;object-fit:cover;
    filter:grayscale(100%) contrast(1.25) brightness(0.65);
}

.photo-info{margin-top:24px;text-align:center;}
.photo-info .name{
    font-size:20px;letter-spacing:6px;color:#cc0000;font-family:"SimHei";
    text-shadow:0 0 10px rgba(255,0,0,0.85),0 0 20px rgba(10,80,55,0.25);
}
.photo-info .years{margin-top:8px;font-size:15px;color:#774444;}
.photo-info .tag{margin-top:6px;font-size:13px;color:#990000;letter-spacing:2px;}

.altar-section{margin-top:35px;width:100%;display:flex;flex-direction:column;align-items:center;}
.altar{
    width:420px;
    background:linear-gradient(180deg,#120000,#020000);
    border:1px solid #330000;
    padding:18px;
    box-shadow:0 0 40px rgba(80,0,0,0.45), inset 0 0 30px rgba(15,70,50,0.12);
    position:relative;
}
.altar::before{
    content:"";position:absolute;top:0;left:50%;width:60%;height:1px;
    background:linear-gradient(90deg,transparent,#ff2222,transparent);transform:translateX(-50%);
}

.incense-row{display:flex;justify-content:center;gap:18px;margin-bottom:12px;}
.incense{
    width:4px;height:90px;background:linear-gradient(180deg,#5a2d0c,#2e1606);position:relative;
}
.incense::after{
    content:"";position:absolute;top:-8px;left:50%;width:10px;height:10px;
    background:radial-gradient(circle,#ff2200,#660000);border-radius:50%;transform:translateX(-50%);
    box-shadow:0 0 18px #ff0000,0 0 28px rgba(20,90,65,0.3);
}
.smoke{
    position:absolute;top:-30px;left:50%;width:22px;height:65px;
    background:radial-gradient(ellipse,rgba(180,220,200,0.4),transparent 70%);
    filter:blur(12px);opacity:0.35;animation:smokeRise 5s infinite ease-out;transform:translateX(-50%);
}
.incense:nth-child(2) .smoke{animation-delay:1.5s;}
.incense:nth-child(3) .smoke{animation-delay:3s;}
@keyframes smokeRise{
    0%{transform:translateX(-50%) translateY(0);opacity:0.45;}
    100%{transform:translateX(-50%) translateY(-40px);opacity:0;}
}

.spirit-tablet{text-align:center;padding:12px;border:1px solid #220000;background:rgba(0,0,0,0.8);}
.spirit-tablet p{color:#ddaaaa;font-size:15px;letter-spacing:3px;}
.spirit-tablet .name{font-size:20px;font-family:"SimHei";color:#ff8888;margin:8px 0;}

.bottom-son-text{
    width:100%;text-align:center;padding:40px 0 60px;
    font-size:18px;letter-spacing:4px;color:#aa7777;
    text-shadow:0 0 8px rgba(90,0,0,0.4);position:relative;z-index:2;
}
.bottom-son-text span{color:#ffdddd;}

.foot-fog{
    position:fixed;bottom:0;left:0;width:100%;height:260px;
    background:linear-gradient(0deg,rgba(0,0,0,0.99),transparent);
    pointer-events:none;z-index:4;
}

.ash{
    position:fixed;width:2px;height:2px;background:#888;opacity:0.5;border-radius:50%;
    pointer-events:none;animation:fallAsh 12s linear infinite;z-index:1;
}
.ash:nth-child(1){left:10%;animation-delay:0s;}
.ash:nth-child(2){left:30%;animation-delay:2s;}
.ash:nth-child(3){left:50%;animation-delay:4s;}
.ash:nth-child(4){left:70%;animation-delay:6s;}
.ash:nth-child(5){left:90%;animation-delay:8s;}
@keyframes fallAsh{
    0%{transform:translateY(-10px);opacity:0;}
    10%{opacity:0.6;}
    90%{opacity:0.6;}
    100%{transform:translateY(100vh);opacity:0;}
}

@keyframes darkFlicker{
    0%,100%{box-shadow:0 0 45px rgba(120,0,0,0.6);}
    50%{box-shadow:0 0 90px rgba(255,0,0,1), inset 0 0 45px rgba(20,90,60,0.3);}
}
.flicker-active{animation:darkFlicker 0.4s ease-in-out 4;}

/* 右下角 盲区事务所聊天弹窗 论坛风格 提亮鲜艳配色 */
.chat-popup{
    position:fixed;right:30px;bottom:30px;width:240px;padding:14px;
    background:#171d26;border:1px solid #72a0d8;box-shadow:0 0 14px rgba(70,130,200,0.35);
    border-radius:3px;z-index:999;cursor:pointer;opacity:0;transform:translateY(100px);
    transition:all 0.8s ease;pointer-events:none;
}
.chat-popup.show{opacity:1;transform:translateY(0);pointer-events:auto;}
.chat-popup h4{color:#63b8ff;font-size:16px;letter-spacing:2px;margin-bottom:6px;}
.chat-popup p{color:#d0dce8;font-size:13px;line-height:1.5;}

/* 底部固定页脚区域，放置页码 */
.page-footer-num{
    position:absolute;
    right:40px;
    bottom:30px;
    color:#775555;
    font-size:14px;
    letter-spacing:1px;
    z-index:99;
}

@media(max-width:920px){
    .main-container{width:96%;flex-direction:column;min-height:auto;}
    .side-couple{width:100%;padding:20px 0;}
    .vertical-scroll{width:auto;max-width:130px;height:auto;padding:10px 24px;}
    .couple-text{writing-mode:horizontal-tb;transform:none !important;font-size:20px;line-height:2;}
    .photo-frame{width:260px;height:340px;}
    .altar{width:90%;}
    .ghost-fog-left,.ghost-fog-right{display:none;}
    .bottom-son-text{font-size:16px;}
    .chat-popup{width:200px;right:15px;bottom:15px;}
    .page-footer-num{right:20px;bottom:20px;font-size:13px;}
}
</style>
</head>
<body>
<!-- 右下角聊天弹窗 -->
<div class="chat-popup" id="chatBox" onclick="location.href='msg2.html'">
    <h4>盲区事务所</h4>
    <p>查到此处，如有线索可与我方对接</p>
</div>

<div class="ghost-fog-left"></div>
<div class="ghost-fog-right" style="--flip:-1"></div>

<div class="ash"></div>
<div class="ash"></div>
<div class="ash"></div>
<div class="ash"></div>
<div class="ash"></div>

<div class="top-mourn">
    <h1>悼 念</h1>
    <p>沈砚舟老翁｜弥山苍翁成仙案</p>
</div>

<div class="main-container">
    <!-- 左侧竖联 -->
    <div class="side-couple left-couple">
        <div class="vertical-scroll">
            <div class="couple-text">雾岭无声留旧影山风有泪送归人</div>
        </div>
    </div>

    <!-- 中间遗照灵位 -->
    <div class="center-photo">
        <div class="photo-frame" id="photoFrame">
            <!-- 改为本地images文件夹下照片 -->
            <img src="tupian/syz.png" alt="沈砚舟老翁遗照">
        </div>

        <div class="photo-info">
            <div class="name">沈砚舟</div>
            <div class="years">1923年1月1日｜ 2023年1月1日</div>
        </div>

        <div class="altar-section">
            <div class="altar">
                <div class="incense-row">
                    <div class="incense"><div class="smoke"></div></div>
                    <div class="incense"><div class="smoke"></div></div>
                    <div class="incense"><div class="smoke"></div></div>
                </div>
                <div class="spirit-tablet">
                    <p>故显考沈公砚舟之灵位</p>
                    <div class="name">沈砚舟</div>
                    <p>生于壬戌年冬月十五日<br/>殁于癸卯年冬月十五日</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 右侧竖联 -->
    <div class="side-couple right-couple">
        <div class="vertical-scroll">
            <div class="couple-text">故人已赴云雾去此地空余晚钟音</div>
        </div>
    </div>
</div>

<div class="bottom-son-text">养子：<span>张宝钟</span></div>

<!-- 底部雾层 -->
<div class="foot-fog"></div>

<!-- 页面右下角固定页码，不随滚动移动 -->
<div class="page-footer-num">(32/34)</div>

<script>
const photoFrame = document.getElementById('photoFrame');
const chatBox = document.getElementById('chatBox');
let popShow = false;

window.addEventListener('scroll',function(){
    if(popShow) return;
    let scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
    let scrollHeight = document.documentElement.scrollHeight;
    let clientHeight = document.documentElement.clientHeight;

    if(scrollTop + clientHeight >= scrollHeight - 120){
        setTimeout(()=>{
            chatBox.classList.add('show');
            popShow = true;
        },1200);
    }
});

window.addEventListener('load', ()=>{
    setTimeout(()=>{
        photoFrame.classList.add('flicker-active');
        setTimeout(()=>photoFrame.classList.remove('flicker-active'), 1600);
    }, 800);
});

photoFrame.addEventListener('click', ()=>{
    photoFrame.classList.add('flicker-active');
    setTimeout(()=>photoFrame.classList.remove('flicker-active'), 1600);
});
</script>
</body>
</html>
