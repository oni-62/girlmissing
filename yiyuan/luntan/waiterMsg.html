<script>
const chatBox = document.getElementById('chatBox');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');

// 我方台词队列
const userLines = [
    "",
    "你好，我想问一下5月10日预约名单。",
    "我朋友那天和我约好来店里，那天我没去成但是之后又联系不上她，想确认她后来有没有到店。",
    "是吗？具体是什么事情？"
];
let lineIndex = 0;

// 服务员回复映射，修复语法逗号错误
const replyMap = {
    "": "您好！感谢您预约咱家咖啡馆，请问关于咱们家咖啡馆有什么想问的问题？",
    "你好，我想问一下5月10日预约名单。": "5月10日吗？很久之前了，请问您问名单有什么原因？",
    "我朋友那天和我约好来店里，那天我没去成但是之后又联系不上她，想确认她后来有没有到店。": "您的朋友是联系不上了吗？最近我们上丹市最近确实不太平。",
    "是吗？具体是什么事情？": "我也是听其他店员讲的，据说是在我们这边总有人去了之后回不来了，不知道是因为什么呢，那个后山以前发生过案件，封了一段时间，但几年前又解封了。哎呀，和您说太多了，我发给你一张5月10日的名单。希望可以帮到您。<br><a href=\"coffee.pdf\" style=\"color:#003399;text-decoration:underline;\">5月10日预约名单PDF文件</a>"
};

// 固定聊天时间
function getTime(){
    return `2026-06-03 19:20`;
}

// 对方消息
function addOtherMsg(text){
    const html = `
    <div class="msg-row msg-other">
        <div class="msg-avatar">
            <img src="avatar.png" alt="咖啡馆服务员">
        </div>
        <div class="msg-wrap">
            <div class="msg-time">${getTime()}</div>
            <div class="msg-text">${text}</div>
        </div>
    </div>`;
    chatBox.insertAdjacentHTML('beforeend', html);
    chatBox.scrollTop = chatBox.scrollHeight;
}
// 我方消息
function addSelfMsg(text){
    const html = `
    <div class="msg-row msg-self">
        <div class="msg-wrap">
            <div class="msg-time">${getTime()}</div>
            <div class="msg-text">${text}</div>
        </div>
    </div>`;
    chatBox.insertAdjacentHTML('beforeend', html);
    chatBox.scrollTop = chatBox.scrollHeight;
}

// 页面加载自动弹出服务员第一条消息
window.onload = function(){
    setTimeout(()=>{
        addOtherMsg("您好！感谢您预约咱家咖啡馆，请问关于咱们家咖啡馆有什么想问的问题？");
        lineIndex = 1;
    },300);
}

// 点击输入框填充下一句台词
msgInput.onclick = function(){
    if(lineIndex < userLines.length){
        this.value = userLines[lineIndex];
    }else{
        this.value = "";
        this.placeholder = "当前对话结束";
    }
}

// 发送按钮
sendBtn.onclick = function(){
    const text = msgInput.value.trim();
    if(!text) return;
    addSelfMsg(text);
    lineIndex++;
    msgInput.value = "";
    const reply = replyMap[text];
    if(reply){
        setTimeout(()=>{
            addOtherMsg(reply);
        },800);
    }
}

// 回车发送
msgInput.onkeydown = function(e){
    if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        sendBtn.click();
    }
}
</script>
